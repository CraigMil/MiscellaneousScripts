name: Claude Investigates Issue

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  investigate:
    if: "(github.event_name == 'issues' && github.event.label.name == 'investigate') || (github.event_name == 'issue_comment' && contains(toLower(github.event.comment.body), 'investigate'))"
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Post starting comment
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "🔍 Claude is on it — investigation started."

      - name: Run Claude investigation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          EXTRA_CONTEXT=""
          if [ -n "$COMMENT_BODY" ]; then
            EXTRA_CONTEXT="Additional context from triggering comment: ${COMMENT_BODY}"
          fi

          PROMPT="You are investigating a GitHub issue in this repository (CraigMil/MiscellaneousScripts).

          Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          ${ISSUE_BODY}

          ${EXTRA_CONTEXT}

          Your task:
          1. Read the issue carefully
          2. Explore the relevant code in this repo
          3. If the issue references another repo under the CraigMil GitHub account, clone it with: gh repo clone CraigMil/<repo-name> /tmp/<repo-name>
          4. Identify the root cause or answer the question
          5. Write a clear, concise findings summary

          Output only the findings — this will be posted as a GitHub issue comment."

          # Mark time so we can find the session file after
          touch /tmp/claude_marker

          RESULT=$(claude --dangerously-skip-permissions --print "$PROMPT")

          # Find the session ID from the most recently created claude session file
          SESSION_ID=$(find ~/.claude -name "*.jsonl" -newer /tmp/claude_marker 2>/dev/null | sort -t/ -k1 | tail -1 | xargs basename 2>/dev/null | sed 's/\.jsonl//')

          # Build the result comment
          COMMENT="## Claude Investigation Complete

          ${RESULT}"

          if [ -n "$SESSION_ID" ]; then
            COMMENT="${COMMENT}

          ---
          **To resume this session on your Mac:**
          \`\`\`
          claude --resume ${SESSION_ID}
          \`\`\`"
          fi

          gh issue comment "$ISSUE_NUMBER" --body "$COMMENT"
