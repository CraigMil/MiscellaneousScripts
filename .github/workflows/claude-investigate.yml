name: Claude Investigates Issue

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to investigate'
        required: true

jobs:
  investigate:
    if: "github.event_name == 'workflow_dispatch' || (github.event_name == 'issues' && github.event.label.name == 'investigate') || github.event_name == 'issue_comment'"
    runs-on: self-hosted

    steps:
      - name: Check trigger condition
        id: gate
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "issue_comment" ]; then
            echo "$COMMENT_BODY" | grep -qi "investigate" || { echo "skip=true" >> $GITHUB_OUTPUT; exit 0; }
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Checkout repo
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Post starting comment
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "Claude is on it - investigation started."

      - name: Run Claude investigation
        if: steps.gate.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # Fetch full comment thread
          COMMENTS=$(gh api repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUMBER/comments --jq '[.[] | "[\(.created_at | split("T")[0])] \(.user.login): \(.body)"] | join("\n---\n")')

          PROMPT="You are investigating a GitHub issue in this repository.

          Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          Issue body:
          ${ISSUE_BODY}

          Comment thread:
          ${COMMENTS}

          Your task:
          1. Read the issue carefully
          2. Explore the relevant code in this repo
          3. If the issue references another repo under the CraigMil GitHub account, clone it with: gh repo clone CraigMil/<repo-name> /tmp/<repo-name>
          4. Identify the root cause or answer the question
          5. Write a clear, concise findings summary

          Output only the findings — this will be posted as a GitHub issue comment."

          MARKER=~/claude_marker
          touch "$MARKER"

          RESULT=$(claude --dangerously-skip-permissions --print "$PROMPT")

          SESSION_ID=$(find ~/.claude -name "*.jsonl" -newer "$MARKER" -not -path "*/subagents/*" 2>/dev/null | xargs -I{} basename {} .jsonl 2>/dev/null | grep -E '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$' | tail -1)
          rm -f "$MARKER"

          COMMENT="## Claude Investigation Complete

          ${RESULT}"

          if [ -n "$SESSION_ID" ]; then
            COMMENT="${COMMENT}

          ---
          To resume this session on your Mac:
          claude --resume ${SESSION_ID}"
          fi

          gh issue comment "$ISSUE_NUMBER" --body "$COMMENT"
